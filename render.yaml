services:
  - type: web
    name: nexaura-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexaura-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: nexaura-db
    plan: free
    databaseName: nexaura
    user: nexaura_user
